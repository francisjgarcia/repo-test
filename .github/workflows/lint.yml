name: Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint workflows
    uses: francisjgarcia/actions-templates/.github/workflows/wf-lint.yml@main
    with:
      actionlint_paths: '.github/workflows/*.yml'
      yamllint_paths: '.github/workflows/'
